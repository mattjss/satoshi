<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>satoshi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root { --sz: 422px; }
    @media (min-width: 1440px) { :root { --sz: 576px; } }
    @media (max-width: 480px)  { :root { --sz: 322px; } }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #101010;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      font-family: 'Geist Mono', monospace;
      transition: background 0.35s;
    }
    body.light { background: #fafafa; }

    /* ── Frame ── */
    #frame {
      width: var(--sz);
      background: #181818;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.35s;
    }
    body.light #frame { background: #f0efed; }

    /* ── Chart canvas ── */
    #c {
      display: block;
      width: var(--sz);
      height: 200px;
    }

    /* ── Details ── */
    #details {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 16px 20px 20px;
    }

    /* Price row */
    #price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    #priceVal {
      font-size: 22px;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      color: rgba(255,255,255,0.88);
      transition: color 0.35s;
    }
    body.light #priceVal { color: rgba(0,0,0,0.82); }

    #changeBadge {
      font-size: 10px; font-weight: 300;
      padding: 2px 6px; border-radius: 4px; border: 1px solid transparent;
      letter-spacing: 0.02em;
    }
    #changeBadge.up { color: #22c55e; border-color: rgba(34,197,94,0.22); background: rgba(34,197,94,0.08); }
    #changeBadge.dn { color: #ef4444; border-color: rgba(239,68,68,0.22);  background: rgba(239,68,68,0.08); }

    /* Range row */
    #range-row { display: flex; gap: 2px; }
    .rp {
      padding: 3px 9px; border-radius: 20px;
      font-family: 'Geist Mono', monospace;
      font-size: 9px; font-weight: 300; letter-spacing: 0.07em; text-transform: uppercase;
      color: rgba(255,255,255,0.20); background: transparent; border: 1px solid transparent;
      cursor: pointer; transition: all 0.15s;
    }
    .rp:hover { color: rgba(255,255,255,0.48); }
    .rp.on    { color: #F7931A; border-color: rgba(247,147,26,0.25); background: rgba(247,147,26,0.07); }

    body.light .rp       { color: rgba(0,0,0,0.26); }
    body.light .rp:hover { color: rgba(0,0,0,0.52); }
    body.light .rp.on    { color: #c96800; border-color: rgba(201,104,0,0.28); background: rgba(201,104,0,0.07); }

    /* Controls row */
    #controls-row { display: flex; align-items: center; }
    .toggle {
      position: relative; display: inline-block;
      width: 26px; height: 14px; cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .knob {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.08); border-radius: 7px; transition: background 0.2s;
    }
    .knob::before {
      content: ''; position: absolute;
      width: 10px; height: 10px; left: 2px; top: 2px;
      background: rgba(255,255,255,0.22); border-radius: 50%;
      transition: transform 0.18s, background 0.18s;
    }
    .toggle input:checked + .knob { background: rgba(255,255,255,0.18); }
    .toggle input:checked + .knob::before { transform: translateX(12px); background: rgba(255,255,255,0.70); }
    body.light .knob             { background: rgba(0,0,0,0.10); }
    body.light .knob::before     { background: rgba(0,0,0,0.26); }
    body.light .toggle input:checked + .knob            { background: rgba(0,0,0,0.16); }
    body.light .toggle input:checked + .knob::before    { background: rgba(0,0,0,0.68); }

    /* Tooltip */
    #tip {
      position: fixed; pointer-events: none;
      padding: 3px 8px; border-radius: 4px;
      font-size: 10px; font-family: 'Geist Mono', monospace; letter-spacing: 0.03em;
      white-space: nowrap; opacity: 0; transition: opacity 0.08s;
      transform: translateX(-50%);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="frame">
    <canvas id="c"></canvas>
    <div id="details">
      <div id="price-row">
        <span id="priceVal">—</span>
        <span id="changeBadge" class="up">—</span>
      </div>
      <div id="range-row">
        <button class="rp on" data-d="12h">12H</button>
        <button class="rp" data-d="1">1D</button>
        <button class="rp" data-d="7">1W</button>
        <button class="rp" data-d="30">1M</button>
        <button class="rp" data-d="90">3M</button>
        <button class="rp" data-d="365">1Y</button>
        <button class="rp" data-d="max">All</button>
      </div>
      <div id="controls-row">
        <label class="toggle"><input type="checkbox" id="mode-switch"><span class="knob"></span></label>
      </div>
    </div>
  </div>
  <div id="tip"></div>

<script>
  // ── Canvas setup ──────────────────────────────────────────────────────────
  const C_W = 422, C_H = 200;
  const DPR = window.devicePixelRatio || 1;
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  canvas.width  = C_W * DPR;
  canvas.height = C_H * DPR;

  const priceValEl  = document.getElementById('priceVal');
  const changeBadge = document.getElementById('changeBadge');
  const modeSwitch  = document.getElementById('mode-switch');
  const tipEl       = document.getElementById('tip');

  // ── Dark / light ─────────────────────────────────────────────────────────
  const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
  if (prefersLight) { document.body.classList.add('light'); modeSwitch.checked = true; }
  modeSwitch.addEventListener('change', e => {
    document.body.classList.toggle('light', e.target.checked);
    if (chartData.length) draw(animProg);
  });
  const isLight = () => document.body.classList.contains('light');

  // ── Palette ───────────────────────────────────────────────────────────────
  function pal() {
    const l = isLight();
    return {
      bg:       l ? '#f0efed'                  : '#181818',
      line:     l ? '#E07510'                  : '#F7931A',
      lineBear: l ? 'rgba(210,55,55,0.80)'     : 'rgba(239,68,68,0.85)',
      fill0:    l ? 'rgba(224,117,16,0.10)'    : 'rgba(247,147,26,0.10)',
      fill1:    'rgba(247,147,26,0)',
      cross:    l ? 'rgba(0,0,0,0.10)'         : 'rgba(255,255,255,0.10)',
      halvLine: 'rgba(247,147,26,0.12)',
      halvText: 'rgba(247,147,26,0.32)',
      tipBg:    l ? 'rgba(230,228,224,0.96)'   : 'rgba(32,32,32,0.94)',
      tipBrd:   l ? 'rgba(0,0,0,0.07)'         : 'rgba(255,255,255,0.07)',
      tipTxt:   l ? 'rgba(0,0,0,0.70)'         : 'rgba(255,255,255,0.70)',
    };
  }

  // ── Halvings ──────────────────────────────────────────────────────────────
  const HALVINGS = [
    Date.UTC(2012, 10, 28), Date.UTC(2016, 6, 9),
    Date.UTC(2020, 4, 11),  Date.UTC(2024, 3, 19),
  ];

  // ── Chart padding ─────────────────────────────────────────────────────────
  const PL = 48, PR = 48, PT = 18, PB = 18;

  // ── State ─────────────────────────────────────────────────────────────────
  let chartData    = [];
  let currentRange = '12h';
  let hoverI       = null;
  let animProg     = 0;
  let animStart    = null;
  let isIntro      = true;
  let isReady      = false;
  let prevRawPrice = null;
  let dispPrice    = null;
  let lastNow      = performance.now();

  const INTRO_DUR = 4800;

  // ── Fritsch-Carlson monotone spline ───────────────────────────────────────
  function getTangents(pts) {
    const n = pts.length;
    if (n < 2) return new Array(n).fill(0);
    const m = new Array(n).fill(0);
    const d = [];
    for (let i = 0; i < n-1; i++) {
      const dx = pts[i+1].x - pts[i].x;
      d[i] = dx ? (pts[i+1].y - pts[i].y) / dx : 0;
    }
    m[0] = d[0]; m[n-1] = d[n-2];
    for (let i = 1; i < n-1; i++)
      m[i] = d[i-1] * d[i] <= 0 ? 0 : (d[i-1] + d[i]) / 2;
    for (let i = 0; i < n-1; i++) {
      if (Math.abs(d[i]) < 1e-10) { m[i] = m[i+1] = 0; continue; }
      const a = m[i]/d[i], b = m[i+1]/d[i], h = Math.sqrt(a*a + b*b);
      if (h > 3) { const s = 3/h; m[i] = s*a*d[i]; m[i+1] = s*b*d[i]; }
    }
    return m;
  }

  function splinePath(pts, tan) {
    if (pts.length < 2) return;
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 0; i < pts.length-1; i++) {
      const h = pts[i+1].x - pts[i].x;
      ctx.bezierCurveTo(
        pts[i].x   + h/3, pts[i].y   + tan[i]   * h/3,
        pts[i+1].x - h/3, pts[i+1].y - tan[i+1] * h/3,
        pts[i+1].x, pts[i+1].y
      );
    }
  }

  // ── Map ───────────────────────────────────────────────────────────────────
  function makeMap(data) {
    const prices = data.map(d => d.price);
    const minP   = Math.min(...prices);
    const maxP   = Math.max(...prices);
    const span   = maxP - minP || 1;
    const N      = data.length;
    const plotW  = C_W - PL - PR;
    const plotH  = C_H - PT - PB;
    return {
      N,
      px: i => PL + (i / (N-1)) * plotW,
      py: p => PT + plotH * (1 - (p - minP) / span),
      minP, maxP,
    };
  }

  // ── Intro easing: smooth-start, mostly linear ─────────────────────────────
  function ease(t) {
    return t < 0.06 ? (t/0.06) * (t/0.06) * 0.06 : t;
  }

  // ── Draw ──────────────────────────────────────────────────────────────────
  function draw(progress) {
    const p = pal();
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.clearRect(0, 0, C_W, C_H);
    ctx.fillStyle = p.bg;
    ctx.fillRect(0, 0, C_W, C_H);

    if (!chartData.length) return;

    const { px, py, minP, N } = makeMap(chartData);
    const prices = chartData.map(d => d.price);
    const visN   = Math.max(2, Math.ceil(N * Math.min(1, progress)));
    const isBull = prices[N-1] >= prices[0];

    const pts = [];
    for (let i = 0; i < visN; i++) pts.push({ x: px(i), y: py(prices[i]) });
    const tan = getTangents(pts);

    // Fill
    const floorY = py(minP);
    const grad   = ctx.createLinearGradient(0, PT, 0, floorY);
    grad.addColorStop(0, p.fill0);
    grad.addColorStop(1, p.fill1);
    ctx.save();
    ctx.beginPath();
    splinePath(pts, tan);
    ctx.lineTo(pts[pts.length-1].x, floorY);
    ctx.lineTo(pts[0].x, floorY);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    // Halving markers (longer ranges only)
    if (progress >= 0.99 && N > 1) {
      const minTs = chartData[0].ts, maxTs = chartData[N-1].ts;
      HALVINGS.forEach(ts => {
        if (ts <= minTs || ts >= maxTs) return;
        const hvX = PL + ((ts - minTs) / (maxTs - minTs)) * (C_W - PL - PR);
        ctx.save();
        ctx.beginPath(); ctx.moveTo(hvX, PT + 10); ctx.lineTo(hvX, C_H - PB);
        ctx.strokeStyle = p.halvLine; ctx.lineWidth = 1; ctx.setLineDash([2, 5]);
        ctx.stroke(); ctx.restore();
        ctx.save();
        ctx.font = '8px Geist Mono, monospace';
        ctx.fillStyle = p.halvText; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText('₿', hvX, PT + 1); ctx.restore();
      });
    }

    // Line
    ctx.save();
    ctx.beginPath();
    splinePath(pts, tan);
    ctx.strokeStyle = isBull ? p.line : p.lineBear;
    ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();

    // Crosshair
    if (!isIntro && hoverI !== null && hoverI < N) {
      const x = px(hoverI);
      ctx.save();
      ctx.beginPath(); ctx.moveTo(x, PT); ctx.lineTo(x, C_H - PB);
      ctx.strokeStyle = p.cross; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
      ctx.stroke(); ctx.restore();

      const d   = chartData[hoverI];
      const cx  = Math.max(PL + 30, Math.min(C_W - PR - 30, x));
      const rect = canvas.getBoundingClientRect();
      tipEl.style.left    = (rect.left + cx * (rect.width / C_W)) + 'px';
      tipEl.style.top     = (rect.top  + py(d.price) * (rect.height / C_H) - 30) + 'px';
      tipEl.textContent   = '$' + d.price.toLocaleString('en-US', { maximumFractionDigits: 0 });
      tipEl.style.background = p.tipBg;
      tipEl.style.border     = '1px solid ' + p.tipBrd;
      tipEl.style.color      = p.tipTxt;
      tipEl.style.opacity    = '1';
    } else {
      tipEl.style.opacity = '0';
    }
  }

  // ── Main loop ─────────────────────────────────────────────────────────────
  function loop(now) {
    const dt = Math.min((now - lastNow) / 1000, 0.05);
    lastNow = now;

    if (isReady) {
      if (!animStart) animStart = now;
      const rawT = Math.min(1, (now - animStart) / INTRO_DUR);
      animProg   = ease(rawT);

      // Tick price up during intro to match visible chart tip
      if (isIntro && chartData.length) {
        const vi = Math.min(chartData.length-1, Math.floor(animProg * (chartData.length-1)));
        priceValEl.textContent = '$' + Math.round(chartData[vi].price).toLocaleString('en-US');
      }

      draw(animProg);

      if (rawT >= 1 && isIntro) {
        isIntro = false;
        animatePrice(prevRawPrice);
      }
    } else {
      // Blank bg while fetching
      const p = pal();
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      ctx.fillStyle = p.bg;
      ctx.fillRect(0, 0, C_W, C_H);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ── Price counter ─────────────────────────────────────────────────────────
  function animatePrice(to) {
    if (to === null) return;
    const from = dispPrice || to;
    const t0   = performance.now(), dur = 550;
    (function roll(now) {
      const t = Math.min(1, (now - t0) / dur);
      const e = t < 0.5 ? 2*t*t : -1 + (4-2*t)*t;
      dispPrice = from + (to - from) * e;
      priceValEl.textContent = '$' + Math.round(dispPrice).toLocaleString('en-US');
      if (t < 1) requestAnimationFrame(roll);
    })(t0);
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────
  async function fetchMarket() {
    const r = await fetch(
      'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin&sparkline=false'
    );
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return (await r.json())[0];
  }

  async function fetchChart(range) {
    const days = range === '12h' ? 1 : range;
    const r = await fetch(
      `https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=${days}`
    );
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    let raw = j.prices;
    if (range === '12h') {
      const cutoff = Date.now() - 12 * 3600 * 1000;
      raw = raw.filter(([ts]) => ts >= cutoff);
    }
    const step = Math.max(1, Math.floor(raw.length / 500));
    return raw.filter((_, i) => i % step === 0).map(([ts, price]) => ({ ts, price }));
  }

  // ── Hover ─────────────────────────────────────────────────────────────────
  canvas.addEventListener('mousemove', e => {
    if (!chartData.length || isIntro) return;
    const rect = canvas.getBoundingClientRect();
    const relX = (e.clientX - rect.left) * (C_W / rect.width);
    const { N } = makeMap(chartData);
    hoverI = Math.max(0, Math.min(N-1,
      Math.round(((relX - PL) / (C_W - PL - PR)) * (N-1))
    ));
  });
  canvas.addEventListener('mouseleave', () => { hoverI = null; tipEl.style.opacity = '0'; });

  // ── Range pills ───────────────────────────────────────────────────────────
  document.querySelectorAll('.rp').forEach(btn => {
    btn.addEventListener('click', async () => {
      document.querySelectorAll('.rp').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      currentRange = btn.dataset.d;
      hoverI = null; animStart = null; animProg = 0; isIntro = false;
      try {
        chartData = await fetchChart(currentRange);
      } catch {}
    });
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  async function boot() {
    try {
      const [coin, chart] = await Promise.all([fetchMarket(), fetchChart('12h')]);
      chartData    = chart;
      prevRawPrice = coin.current_price;

      const change = coin.price_change_percentage_24h;
      const isUp   = change >= 0;
      changeBadge.textContent = (isUp ? '+' : '') + change.toFixed(2) + '%';
      changeBadge.className   = isUp ? 'up' : 'dn';

      isReady = true;

      setInterval(async () => {
        if (isIntro) return;
        try {
          const c = await fetchMarket();
          if (c.current_price !== prevRawPrice) {
            prevRawPrice = c.current_price;
            animatePrice(c.current_price);
            const up = c.price_change_percentage_24h >= 0;
            changeBadge.textContent = (up ? '+' : '') + c.price_change_percentage_24h.toFixed(2) + '%';
            changeBadge.className   = up ? 'up' : 'dn';
          }
        } catch {}
      }, 45000);
    } catch (e) { console.error(e); }
  }

  boot();
</script>
</body>
</html>
