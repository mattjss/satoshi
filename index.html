<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>satoshi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root { --sz: 422px; }
    @media (min-width: 1440px) { :root { --sz: 576px; } }
    @media (max-width: 480px)  { :root { --sz: 322px; } }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #101010;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      font-family: 'Geist Mono', monospace;
      transition: background 0.35s;
      cursor: default;
    }
    body.light { background: #fafafa; }

    #wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }

    canvas {
      width: var(--sz); height: var(--sz);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      display: block;
      cursor: crosshair;
      transition: border-color 0.35s;
    }
    body.light canvas { border-color: rgba(0,0,0,0.07); }

    /* ── Meta ── */
    #meta {
      display: flex; align-items: center; gap: 20px;
      font-size: 10px; font-weight: 300; letter-spacing: 0.04em;
      color: rgba(255,255,255,0.22);
      transition: color 0.35s;
    }
    body.light #meta { color: rgba(0,0,0,0.28); }

    #priceVal {
      font-weight: 400;
      color: rgba(255,255,255,0.70);
      font-variant-numeric: tabular-nums;
      transition: color 0.35s;
      min-width: 90px;
    }
    body.light #priceVal { color: rgba(0,0,0,0.72); }

    #changeBadge {
      font-size: 9px; font-weight: 400;
      padding: 2px 5px; border-radius: 4px; border: 1px solid transparent;
      transition: all 0.35s;
    }
    #changeBadge.up { color: #22c55e; border-color: rgba(34,197,94,0.22); background: rgba(34,197,94,0.08); }
    #changeBadge.dn { color: #ef4444; border-color: rgba(239,68,68,0.22);  background: rgba(239,68,68,0.08); }

    /* ── Bottom ── */
    #bottom { display: flex; flex-direction: column; align-items: center; gap: 8px; }

    #range-row { display: flex; gap: 3px; }
    .rp {
      padding: 3px 10px; border-radius: 20px;
      font-family: 'Geist Mono', monospace;
      font-size: 9px; font-weight: 400; letter-spacing: 0.07em; text-transform: uppercase;
      color: rgba(255,255,255,0.22); background: transparent; border: 1px solid transparent;
      cursor: pointer; transition: all 0.15s;
    }
    .rp:hover { color: rgba(255,255,255,0.50); }
    .rp.on    { color: #F7931A; border-color: rgba(247,147,26,0.28); background: rgba(247,147,26,0.07); }
    body.light .rp       { color: rgba(0,0,0,0.28); }
    body.light .rp:hover { color: rgba(0,0,0,0.55); }
    body.light .rp.on    { color: #c96800; border-color: rgba(201,104,0,0.28); background: rgba(201,104,0,0.07); }

    #controls-row { display: flex; align-items: center; }
    .toggle {
      position: relative; display: inline-block;
      width: 26px; height: 14px; cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .knob {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.08); border-radius: 7px; transition: background 0.2s;
    }
    .knob::before {
      content: ''; position: absolute;
      width: 10px; height: 10px; left: 2px; top: 2px;
      background: rgba(255,255,255,0.22); border-radius: 50%;
      transition: transform 0.18s, background 0.18s;
    }
    .toggle input:checked + .knob { background: rgba(255,255,255,0.18); }
    .toggle input:checked + .knob::before { transform: translateX(12px); background: rgba(255,255,255,0.70); }
    body.light .knob              { background: rgba(0,0,0,0.10); }
    body.light .knob::before      { background: rgba(0,0,0,0.26); }
    body.light .toggle input:checked + .knob             { background: rgba(0,0,0,0.16); }
    body.light .toggle input:checked + .knob::before     { background: rgba(0,0,0,0.68); }

    /* tooltip */
    #tip {
      position: absolute; pointer-events: none;
      padding: 3px 8px; border-radius: 4px;
      font-size: 10px; font-family: 'Geist Mono', monospace; letter-spacing: 0.03em;
      white-space: nowrap; opacity: 0; transition: opacity 0.08s;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>
  <div id="wrap" style="position:relative">
    <canvas id="c"></canvas>
    <div id="meta">
      <span>bitcoin</span>
      <span id="priceVal">—</span>
      <span id="changeBadge" class="up">—</span>
    </div>
    <div id="bottom">
      <div id="range-row">
        <button class="rp on" data-d="12h">12H</button>
        <button class="rp" data-d="1">1D</button>
        <button class="rp" data-d="7">1W</button>
        <button class="rp" data-d="30">1M</button>
        <button class="rp" data-d="90">3M</button>
        <button class="rp" data-d="365">1Y</button>
        <button class="rp" data-d="max">All</button>
      </div>
      <div id="controls-row">
        <label class="toggle"><input type="checkbox" id="mode-switch"><span class="knob"></span></label>
      </div>
    </div>
    <div id="tip"></div>
  </div>

<script>
  // ── Canvas ───────────────────────────────────────────────────────────────
  const SZ  = 422;
  const DPR = window.devicePixelRatio || 1;
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  canvas.width = canvas.height = SZ * DPR;

  const priceValEl  = document.getElementById('priceVal');
  const changeBadge = document.getElementById('changeBadge');
  const modeSwitch  = document.getElementById('mode-switch');
  const tipEl       = document.getElementById('tip');

  // ── Dark / light toggle ─────────────────────────────────────────────────
  const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
  if (prefersLight) { document.body.classList.add('light'); modeSwitch.checked = true; }
  modeSwitch.addEventListener('change', e => {
    document.body.classList.toggle('light', e.target.checked);
    if (chartData.length) draw(animProg);
  });
  function isLight() { return document.body.classList.contains('light'); }

  // ── Palettes ────────────────────────────────────────────────────────────
  function pal() {
    const l = isLight();
    return {
      bg:          l ? '#fafafa'                    : '#101010',
      line:        l ? 'rgba(20,20,20,0.84)'        : 'rgba(250,250,250,0.90)',
      lineBear:    l ? 'rgba(200,50,50,0.75)'       : 'rgba(239,68,68,0.82)',
      fill0:       'rgba(247,147,26,0.09)',
      fill1:       'rgba(247,147,26,0)',
      dot:         '#F7931A',
      glow0:       'rgba(247,147,26,0.38)',
      glow1:       'rgba(247,147,26,0)',
      pulse:       'rgba(247,147,26,__)',
      cross:       l ? 'rgba(0,0,0,0.10)'           : 'rgba(255,255,255,0.11)',
      halvLine:    'rgba(247,147,26,0.14)',
      halvText:    'rgba(247,147,26,0.38)',
      tipBg:       l ? 'rgba(235,235,235,0.95)'     : 'rgba(28,28,28,0.92)',
      tipBorder:   l ? 'rgba(0,0,0,0.08)'           : 'rgba(255,255,255,0.08)',
      tipColor:    l ? 'rgba(0,0,0,0.72)'           : 'rgba(255,255,255,0.72)',
    };
  }

  // ── Halvings ────────────────────────────────────────────────────────────
  const HALVINGS = [
    Date.UTC(2012, 10, 28), Date.UTC(2016, 6, 9),
    Date.UTC(2020, 4, 11),  Date.UTC(2024, 3, 19),
  ];

  // ── State ───────────────────────────────────────────────────────────────
  const PT = 20, PB = 20, PL = 2, PR = 2;

  let chartData    = [];
  let currentRange = '12h';
  let hoverI       = null;
  let animProg     = 0;
  let animStart    = null;
  let isIntro      = true;   // true during the 12h cinematic, false after
  let isReady      = false;  // data loaded and ready
  let lerpEndX     = 0, lerpEndY = 0;
  let pulseRings   = [];
  let pulseTimer   = 0;
  let prevRawPrice = null;
  let lastNow      = performance.now();

  // How long the 12-hour cinematic draw-in takes (ms)
  const INTRO_DUR = 4800;

  // ── Fritsch-Carlson monotone spline ─────────────────────────────────────
  function tangents(pts) {
    const n = pts.length;
    if (n < 2) return new Array(n).fill(0);
    const m = new Array(n).fill(0);
    const d = [];
    for (let i = 0; i < n-1; i++) {
      const dx = pts[i+1].x - pts[i].x;
      d[i] = dx ? (pts[i+1].y - pts[i].y) / dx : 0;
    }
    m[0] = d[0]; m[n-1] = d[n-2];
    for (let i = 1; i < n-1; i++) {
      m[i] = d[i-1] * d[i] <= 0 ? 0 : (d[i-1] + d[i]) / 2;
    }
    for (let i = 0; i < n-1; i++) {
      if (Math.abs(d[i]) < 1e-10) { m[i] = m[i+1] = 0; continue; }
      const a = m[i]/d[i], b = m[i+1]/d[i], h = Math.sqrt(a*a + b*b);
      if (h > 3) { const s = 3/h; m[i] = s*a*d[i]; m[i+1] = s*b*d[i]; }
    }
    return m;
  }

  function splinePath(pts, tan) {
    if (pts.length < 2) return;
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 0; i < pts.length-1; i++) {
      const h = pts[i+1].x - pts[i].x;
      ctx.bezierCurveTo(
        pts[i].x   + h/3, pts[i].y   + tan[i]   * h/3,
        pts[i+1].x - h/3, pts[i+1].y - tan[i+1] * h/3,
        pts[i+1].x, pts[i+1].y
      );
    }
  }

  // ── Map data → canvas coords ─────────────────────────────────────────────
  function makeMap(data) {
    const prices = data.map(d => d.price);
    const minP   = Math.min(...prices);
    const maxP   = Math.max(...prices);
    const span   = maxP - minP || 1;
    const plotW  = SZ - PL - PR;
    const plotH  = SZ - PT - PB;
    const N      = data.length;
    return {
      N,
      px: i => PL + (i / (N-1)) * plotW,
      py: p => PT + plotH * (1 - (p - minP) / span),
      minP, maxP,
    };
  }

  // ── Intro easing: linear with gentle ease-in ────────────────────────────
  function introEase(t) {
    if (t < 0.06) return (t / 0.06) * (t / 0.06) * 0.06;
    return t;
  }

  // ── Draw ─────────────────────────────────────────────────────────────────
  function draw(progress) {
    const p = pal();
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.clearRect(0, 0, SZ, SZ);
    ctx.fillStyle = p.bg;
    ctx.fillRect(0, 0, SZ, SZ);

    if (!chartData.length) return;

    const { px, py, N } = makeMap(chartData);
    const prices = chartData.map(d => d.price);
    const visN   = Math.max(2, Math.ceil(N * Math.min(1, progress)));
    const isBull = prices[N-1] >= prices[0];

    const pts = [];
    for (let i = 0; i < visN; i++) pts.push({ x: px(i), y: py(prices[i]) });
    const tan = tangents(pts);

    // Area fill
    const floorY = py(Math.min(...prices));
    const grad   = ctx.createLinearGradient(0, PT, 0, floorY);
    grad.addColorStop(0, p.fill0);
    grad.addColorStop(1, p.fill1);
    ctx.save();
    ctx.beginPath();
    splinePath(pts, tan);
    ctx.lineTo(pts[pts.length-1].x, floorY);
    ctx.lineTo(pts[0].x, floorY);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    // Halving markers
    if (progress >= 0.99 && N > 1) {
      const minTs = chartData[0].ts, maxTs = chartData[N-1].ts;
      HALVINGS.forEach(ts => {
        if (ts <= minTs || ts >= maxTs) return;
        const hvX = PL + ((ts - minTs) / (maxTs - minTs)) * (SZ - PL - PR);
        ctx.save();
        ctx.beginPath(); ctx.moveTo(hvX, PT + 12); ctx.lineTo(hvX, SZ - PB);
        ctx.strokeStyle = p.halvLine; ctx.lineWidth = 1; ctx.setLineDash([2, 5]);
        ctx.stroke(); ctx.restore();
        ctx.save();
        ctx.font = '8px Geist Mono, monospace'; ctx.fillStyle = p.halvText;
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText('₿', hvX, PT + 2); ctx.restore();
      });
    }

    // Chart line
    ctx.save();
    ctx.beginPath();
    splinePath(pts, tan);
    ctx.strokeStyle = isBull ? p.line : p.lineBear;
    ctx.lineWidth = 1.25; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();

    // Crosshair + tooltip — only in live mode
    if (!isIntro && hoverI !== null && hoverI < N) {
      const x = px(hoverI);
      ctx.save();
      ctx.beginPath(); ctx.moveTo(x, PT); ctx.lineTo(x, SZ - PB);
      ctx.strokeStyle = p.cross; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
      ctx.stroke(); ctx.restore();

      const d = chartData[hoverI];
      const cx = Math.max(44, Math.min(SZ - 44, x));
      const cy = py(d.price);
      const cRect = canvas.getBoundingClientRect();
      const wRect = canvas.parentElement.getBoundingClientRect();
      tipEl.textContent = '$' + d.price.toLocaleString('en-US', { maximumFractionDigits: 0 });
      tipEl.style.left    = (cRect.left - wRect.left + cx * (cRect.width / SZ)) + 'px';
      tipEl.style.top     = (cRect.top  - wRect.top  + cy * (cRect.height / SZ) - 28) + 'px';
      tipEl.style.background = p.tipBg;
      tipEl.style.border     = '1px solid ' + p.tipBorder;
      tipEl.style.color      = p.tipColor;
      tipEl.style.opacity    = '1';
    } else {
      tipEl.style.opacity = '0';
    }

    // Live endpoint — pulse rings + glow + dot
    const ep = pts[pts.length-1];
    lerpEndX += (ep.x - lerpEndX) * 0.10;
    lerpEndY += (ep.y - lerpEndY) * 0.10;

    pulseRings.forEach(r => {
      ctx.beginPath();
      ctx.arc(lerpEndX, lerpEndY, r.r, 0, Math.PI*2);
      ctx.strokeStyle = p.pulse.replace('__', r.a.toFixed(3));
      ctx.lineWidth = 1;
      ctx.stroke();
    });

    const grd = ctx.createRadialGradient(lerpEndX, lerpEndY, 0, lerpEndX, lerpEndY, 18);
    grd.addColorStop(0, p.glow0);
    grd.addColorStop(1, p.glow1);
    ctx.beginPath(); ctx.arc(lerpEndX, lerpEndY, 18, 0, Math.PI*2);
    ctx.fillStyle = grd; ctx.fill();

    ctx.beginPath(); ctx.arc(lerpEndX, lerpEndY, 3.2, 0, Math.PI*2);
    ctx.fillStyle = p.dot; ctx.fill();
  }

  // ── Main loop ─────────────────────────────────────────────────────────────
  function loop(now) {
    const dt = Math.min((now - lastNow) / 1000, 0.05);
    lastNow = now;

    if (isReady) {
      if (!animStart) animStart = now;
      const rawT = Math.min(1, (now - animStart) / INTRO_DUR);
      animProg   = introEase(rawT);

      // During intro: update displayed price to match visible tip
      if (isIntro && chartData.length) {
        const visIdx   = Math.min(chartData.length - 1, Math.floor(animProg * (chartData.length - 1)));
        priceValEl.textContent = '$' + Math.round(chartData[visIdx].price).toLocaleString('en-US');
      }

      // Pulse rings (only after intro or during last 10% of intro)
      if (!isIntro || animProg > 0.90) {
        pulseTimer += dt;
        if (pulseTimer > 1.6) {
          pulseTimer = 0;
          pulseRings.push({ r: 4, a: 0.72 });
        }
      }
      for (let i = pulseRings.length - 1; i >= 0; i--) {
        pulseRings[i].r += 28 * dt;
        pulseRings[i].a *= Math.pow(0.018, dt);
        if (pulseRings[i].a < 0.01) pulseRings.splice(i, 1);
      }

      draw(animProg);

      // Intro complete → live mode
      if (rawT >= 1 && isIntro) {
        isIntro = false;
        animatePrice(prevRawPrice);
      }
    } else {
      // Blank canvas while waiting for data
      const p = pal();
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      ctx.fillStyle = p.bg;
      ctx.fillRect(0, 0, SZ, SZ);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ── Animated price counter ───────────────────────────────────────────────
  let dispPrice = null;
  function animatePrice(to) {
    if (to === null) return;
    const from = dispPrice || to;
    const t0   = performance.now(), dur = 550;
    (function roll(now) {
      const t = Math.min(1, (now - t0) / dur);
      const e = t < 0.5 ? 2*t*t : -1 + (4 - 2*t) * t;
      dispPrice = from + (to - from) * e;
      priceValEl.textContent = '$' + Math.round(dispPrice).toLocaleString('en-US');
      if (t < 1) requestAnimationFrame(roll);
    })(t0);
  }

  // ── Fetch ────────────────────────────────────────────────────────────────
  async function fetchMarket() {
    const r = await fetch(
      'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin&sparkline=false'
    );
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return (await r.json())[0];
  }

  async function fetchChart(range) {
    const days = range === '12h' ? 1 : range;
    const r = await fetch(
      `https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=${days}`
    );
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    let raw = j.prices;
    if (range === '12h') {
      const cutoff = Date.now() - 12 * 3600 * 1000;
      raw = raw.filter(([ts]) => ts >= cutoff);
    }
    const step = Math.max(1, Math.floor(raw.length / 500));
    return raw.filter((_, i) => i % step === 0).map(([ts, price]) => ({ ts, price }));
  }

  // ── Hover ────────────────────────────────────────────────────────────────
  canvas.addEventListener('mousemove', e => {
    if (!chartData.length || isIntro) return;
    const rect = canvas.getBoundingClientRect();
    const relX = (e.clientX - rect.left) * (SZ / rect.width);
    const { N } = makeMap(chartData);
    hoverI = Math.max(0, Math.min(N-1,
      Math.round(((relX - PL) / (SZ - PL - PR)) * (N - 1))
    ));
  });
  canvas.addEventListener('mouseleave', () => { hoverI = null; tipEl.style.opacity = '0'; });

  // ── Range pills ──────────────────────────────────────────────────────────
  document.querySelectorAll('.rp').forEach(btn => {
    btn.addEventListener('click', async () => {
      document.querySelectorAll('.rp').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      currentRange = btn.dataset.d;
      hoverI = null;
      animStart = null; animProg = 0;
      try {
        chartData = await fetchChart(currentRange);
        const { px, py } = makeMap(chartData);
        const prices = chartData.map(d => d.price);
        lerpEndX = px(chartData.length - 1);
        lerpEndY = py(prices[prices.length - 1]);
        pulseRings = [];
      } catch {}
    });
  });

  // ── Boot ─────────────────────────────────────────────────────────────────
  async function boot() {
    try {
      const [coin, chart] = await Promise.all([fetchMarket(), fetchChart('12h')]);

      chartData    = chart;
      prevRawPrice = coin.current_price;

      const change = coin.price_change_percentage_24h;
      const isUp   = change >= 0;
      changeBadge.textContent = (isUp ? '+' : '') + change.toFixed(2) + '%';
      changeBadge.className   = isUp ? 'up' : 'dn';

      // Seed endpoint at the first point so it draws from left
      const { px, py } = makeMap(chartData);
      lerpEndX = px(0);
      lerpEndY = py(chartData[0].price);

      isReady = true; // triggers the loop to start drawing

      // Live price refresh every 45s — only after intro done
      setInterval(async () => {
        if (isIntro) return;
        try {
          const c = await fetchMarket();
          if (c.current_price !== prevRawPrice) {
            prevRawPrice = c.current_price;
            animatePrice(c.current_price);
            const up = c.price_change_percentage_24h >= 0;
            changeBadge.textContent = (up ? '+' : '') + c.price_change_percentage_24h.toFixed(2) + '%';
            changeBadge.className   = up ? 'up' : 'dn';
            pulseRings.push({ r: 4, a: 0.92 });
          }
        } catch {}
      }, 45000);

    } catch (e) {
      console.error('Satoshi boot error:', e);
    }
  }

  boot();
</script>
</body>
</html>
