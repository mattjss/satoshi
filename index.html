<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>satoshi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root { --sz: 422px; }
    @media (min-width: 1440px) { :root { --sz: 576px; } }
    @media (max-width: 480px)  { :root { --sz: 322px; } }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #101010;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      font-family: 'Geist Mono', monospace;
      transition: background 0.35s;
      cursor: default;
    }
    body.light { background: #fafafa; }

    #wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }

    canvas {
      width: var(--sz); height: var(--sz);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      display: block;
      cursor: crosshair;
      transition: border-color 0.35s;
    }
    body.light canvas { border-color: rgba(0,0,0,0.07); }

    /* ── Meta row ── */
    #meta {
      display: flex; align-items: center; gap: 20px;
      font-size: 10px; font-weight: 300; letter-spacing: 0.04em;
      color: rgba(255,255,255,0.22);
      transition: color 0.35s;
    }
    body.light #meta { color: rgba(0,0,0,0.28); }

    #priceVal {
      font-weight: 400;
      color: rgba(255,255,255,0.70);
      font-variant-numeric: tabular-nums;
      transition: color 0.35s;
    }
    body.light #priceVal { color: rgba(0,0,0,0.72); }

    #changeBadge {
      font-size: 9px; font-weight: 400;
      padding: 2px 5px; border-radius: 4px;
      border: 1px solid transparent;
      transition: all 0.35s;
    }
    #changeBadge.up { color: #22c55e; border-color: rgba(34,197,94,0.2); background: rgba(34,197,94,0.08); }
    #changeBadge.dn { color: #ef4444; border-color: rgba(239,68,68,0.2);  background: rgba(239,68,68,0.08);  }

    /* ── Bottom controls ── */
    #bottom { display: flex; flex-direction: column; align-items: center; gap: 8px; }

    #range-row { display: flex; gap: 3px; }

    .rp {
      padding: 3px 10px; border-radius: 20px;
      font-family: 'Geist Mono', monospace;
      font-size: 9px; font-weight: 400; letter-spacing: 0.07em; text-transform: uppercase;
      color: rgba(255,255,255,0.22); background: transparent; border: 1px solid transparent;
      cursor: pointer; transition: all 0.15s;
    }
    .rp:hover { color: rgba(255,255,255,0.50); }
    .rp.on { color: #F7931A; border-color: rgba(247,147,26,0.28); background: rgba(247,147,26,0.07); }

    body.light .rp          { color: rgba(0,0,0,0.28); }
    body.light .rp:hover    { color: rgba(0,0,0,0.55); }
    body.light .rp.on       { color: #c96800; border-color: rgba(201,104,0,0.30); background: rgba(201,104,0,0.07); }

    #controls-row { display: flex; align-items: center; gap: 18px; }

    /* ── Toggle ── */
    .toggle {
      position: relative; display: inline-block;
      width: 26px; height: 14px; cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .knob {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.08); border-radius: 7px; transition: background 0.2s;
    }
    .knob::before {
      content: ''; position: absolute;
      width: 10px; height: 10px; left: 2px; top: 2px;
      background: rgba(255,255,255,0.22); border-radius: 50%;
      transition: transform 0.18s, background 0.18s;
    }
    .toggle input:checked + .knob { background: rgba(255,255,255,0.18); }
    .toggle input:checked + .knob::before { transform: translateX(12px); background: rgba(255,255,255,0.70); }

    body.light .knob              { background: rgba(0,0,0,0.10); }
    body.light .knob::before      { background: rgba(0,0,0,0.26); }
    body.light .toggle input:checked + .knob              { background: rgba(0,0,0,0.16); }
    body.light .toggle input:checked + .knob::before      { background: rgba(0,0,0,0.68); }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c"></canvas>

    <div id="meta">
      <span>bitcoin</span>
      <span id="priceVal">—</span>
      <span id="changeBadge" class="up">—</span>
    </div>

    <div id="bottom">
      <div id="range-row">
        <button class="rp" data-d="7">1W</button>
        <button class="rp" data-d="30">1M</button>
        <button class="rp" data-d="90">3M</button>
        <button class="rp" data-d="180">6M</button>
        <button class="rp on" data-d="365">1Y</button>
        <button class="rp" data-d="max">All</button>
      </div>
      <div id="controls-row">
        <label class="toggle"><input type="checkbox" id="mode-switch"><span class="knob"></span></label>
      </div>
    </div>
  </div>

<script>
  // ── Setup ────────────────────────────────────────────────────────────────
  const SZ  = 422;
  const DPR = window.devicePixelRatio || 1;
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  canvas.width = canvas.height = SZ * DPR;

  const priceValEl  = document.getElementById('priceVal');
  const changeBadge = document.getElementById('changeBadge');
  const modeSwitch  = document.getElementById('mode-switch');

  // ── Dark / light toggle ──────────────────────────────────────────────────
  const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
  if (prefersLight) { document.body.classList.add('light'); modeSwitch.checked = true; }
  modeSwitch.addEventListener('change', e => {
    document.body.classList.toggle('light', e.target.checked);
    if (chartData.length) draw(1);
  });

  function isLight() { return document.body.classList.contains('light'); }

  // ── Color palettes ────────────────────────────────────────────────────────
  function pal() {
    return isLight() ? {
      bg:          '#fafafa',
      line:        'rgba(20,20,20,0.82)',
      lineBear:    'rgba(200,50,50,0.75)',
      fill0:       'rgba(247,147,26,0.10)',
      fill1:       'rgba(247,147,26,0)',
      dot:         '#F7931A',
      glow:        'rgba(247,147,26,0.30)',
      pulse:       'rgba(247,147,26,ALPHA)',
      cross:       'rgba(0,0,0,0.10)',
      halvingLine: 'rgba(247,147,26,0.18)',
      halvingText: 'rgba(247,147,26,0.45)',
      loadLine:    'rgba(247,147,26,0.20)',
    } : {
      bg:          '#101010',
      line:        'rgba(250,250,250,0.88)',
      lineBear:    'rgba(239,68,68,0.80)',
      fill0:       'rgba(247,147,26,0.10)',
      fill1:       'rgba(247,147,26,0)',
      dot:         '#F7931A',
      glow:        'rgba(247,147,26,0.35)',
      pulse:       'rgba(247,147,26,ALPHA)',
      cross:       'rgba(255,255,255,0.12)',
      halvingLine: 'rgba(247,147,26,0.15)',
      halvingText: 'rgba(247,147,26,0.38)',
      loadLine:    'rgba(247,147,26,0.18)',
    };
  }

  // ── Halving dates ─────────────────────────────────────────────────────────
  const HALVINGS = [
    { ts: Date.UTC(2012, 10, 28) },
    { ts: Date.UTC(2016,  6,  9) },
    { ts: Date.UTC(2020,  4, 11) },
    { ts: Date.UTC(2024,  3, 19) },
  ];

  // ── State ─────────────────────────────────────────────────────────────────
  let chartData   = [];
  let currentDays = '365';
  let hoverI      = null;
  let animProg    = 0;  // 0→1 draw-in progress
  let animStart   = null;
  let rafId       = null;
  let loadingT    = 0;  // time for breathing animation
  let isLoading   = true;

  let lerpEndX = 0, lerpEndY = 0;   // lerped endpoint
  let pulseRings = [];               // [{r, alpha}]
  let pulseTimer  = 0;

  let dispPrice = null;              // lerped display price
  let prevRawPrice = null;

  // ── Padding ───────────────────────────────────────────────────────────────
  const PT = 22, PB = 22, PL = 2, PR = 2;

  // ── Fritsch-Carlson monotone spline ───────────────────────────────────────
  function computeTangents(pts) {
    const n = pts.length;
    if (n < 2) return [];
    const m = new Array(n).fill(0);
    const d = [];
    for (let i = 0; i < n - 1; i++) {
      const dx = pts[i+1].x - pts[i].x;
      d[i] = dx === 0 ? 0 : (pts[i+1].y - pts[i].y) / dx;
    }
    m[0] = d[0];
    m[n-1] = d[n-2];
    for (let i = 1; i < n - 1; i++) {
      if (d[i-1] * d[i] <= 0) { m[i] = 0; continue; }
      m[i] = (d[i-1] + d[i]) / 2;
    }
    for (let i = 0; i < n - 1; i++) {
      if (Math.abs(d[i]) < 1e-10) { m[i] = m[i+1] = 0; continue; }
      const a = m[i] / d[i], b = m[i+1] / d[i];
      const h = Math.sqrt(a*a + b*b);
      if (h > 3) { const t = 3/h; m[i] = t*a*d[i]; m[i+1] = t*b*d[i]; }
    }
    return m;
  }

  function splinePath(pts, tangents) {
    if (pts.length < 2) return;
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 0; i < pts.length - 1; i++) {
      const h  = pts[i+1].x - pts[i].x;
      ctx.bezierCurveTo(
        pts[i].x   + h/3, pts[i].y   + tangents[i]   * h/3,
        pts[i+1].x - h/3, pts[i+1].y - tangents[i+1] * h/3,
        pts[i+1].x, pts[i+1].y
      );
    }
  }

  // ── Map helpers ───────────────────────────────────────────────────────────
  function makeMap(data) {
    const prices = data.map(d => d.price);
    const minP   = Math.min(...prices);
    const maxP   = Math.max(...prices);
    const span   = maxP - minP || 1;
    const plotW  = SZ - PL - PR;
    const plotH  = SZ - PT - PB;
    const N      = data.length;
    const px = i  => PL + (i / (N - 1)) * plotW;
    const py = p  => PT + plotH * (1 - (p - minP) / span);
    return { px, py, minP, maxP, span, N };
  }

  // ── Tooltip ───────────────────────────────────────────────────────────────
  let tipEl = null;
  function ensureTip() {
    if (tipEl) return;
    tipEl = document.createElement('div');
    Object.assign(tipEl.style, {
      position: 'absolute', pointerEvents: 'none',
      padding: '3px 7px', borderRadius: '4px',
      fontSize: '10px', fontFamily: 'Geist Mono, monospace',
      letterSpacing: '0.03em', whiteSpace: 'nowrap',
      transition: 'opacity 0.1s', opacity: '0',
    });
    document.getElementById('wrap').style.position = 'relative';
    document.getElementById('wrap').appendChild(tipEl);
  }

  function showTip(x, y, text, color) {
    ensureTip();
    const canvasEl = canvas;
    const canvasRect = canvasEl.getBoundingClientRect();
    const wrapRect  = canvasEl.parentElement.getBoundingClientRect();
    const cx = canvasRect.left - wrapRect.left + x;
    const cy = canvasRect.top  - wrapRect.top  + y;
    tipEl.textContent = text;
    tipEl.style.color = color;
    tipEl.style.background = isLight() ? 'rgba(240,240,240,0.92)' : 'rgba(30,30,30,0.88)';
    tipEl.style.border = isLight() ? '1px solid rgba(0,0,0,0.08)' : '1px solid rgba(255,255,255,0.08)';
    tipEl.style.left    = cx + 'px';
    tipEl.style.top     = (cy - 28) + 'px';
    tipEl.style.transform = 'translateX(-50%)';
    tipEl.style.opacity = '1';
  }
  function hideTip() { if (tipEl) tipEl.style.opacity = '0'; }

  // ── Draw ──────────────────────────────────────────────────────────────────
  function draw(progress) {
    const p = pal();
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.clearRect(0, 0, SZ, SZ);

    // Background
    ctx.fillStyle = p.bg;
    ctx.fillRect(0, 0, SZ, SZ);

    if (!chartData.length) return;

    const { px, py, N } = makeMap(chartData);
    const prices = chartData.map(d => d.price);
    const visN   = Math.max(2, Math.ceil(N * Math.min(1, progress)));

    const isBull  = prices[N-1] >= prices[0];
    const lineCol = isBull ? p.line : p.lineBear;

    // Build visible points
    const pts = [];
    for (let i = 0; i < visN; i++) pts.push({ x: px(i), y: py(prices[i]) });

    const tangents = computeTangents(pts);

    // Gradient fill
    const gy = py(Math.min(...prices));
    const grad = ctx.createLinearGradient(0, PT, 0, gy);
    grad.addColorStop(0, p.fill0);
    grad.addColorStop(1, p.fill1);
    ctx.save();
    ctx.beginPath();
    splinePath(pts, tangents);
    ctx.lineTo(pts[pts.length-1].x, gy);
    ctx.lineTo(pts[0].x, gy);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    // Halving markers (only when zoomed out enough and fully drawn)
    if (progress >= 0.99 && chartData.length > 1) {
      const minTs = chartData[0].ts, maxTs = chartData[N-1].ts;
      HALVINGS.forEach(h => {
        if (h.ts <= minTs || h.ts >= maxTs) return;
        const hvX = PL + ((h.ts - minTs) / (maxTs - minTs)) * (SZ - PL - PR);
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(hvX, PT + 14);
        ctx.lineTo(hvX, SZ - PB);
        ctx.strokeStyle = p.halvingLine;
        ctx.lineWidth = 1;
        ctx.setLineDash([2, 5]);
        ctx.stroke();
        ctx.restore();
        ctx.save();
        ctx.font = '8px Geist Mono, monospace';
        ctx.fillStyle = p.halvingText;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('₿', hvX, PT + 3);
        ctx.restore();
      });
    }

    // Chart line
    ctx.save();
    ctx.beginPath();
    splinePath(pts, tangents);
    ctx.strokeStyle = lineCol;
    ctx.lineWidth   = 1.2;
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';
    ctx.stroke();
    ctx.restore();

    // Crosshair + tooltip
    if (hoverI !== null && progress >= 0.99 && hoverI < N) {
      const x = px(hoverI);
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x, PT);
      ctx.lineTo(x, SZ - PB);
      ctx.strokeStyle = p.cross;
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.stroke();
      ctx.restore();

      const d  = chartData[hoverI];
      const hx = Math.max(40, Math.min(SZ - 40, x));
      showTip(hx, py(d.price),
        '$' + d.price.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 }),
        isLight() ? 'rgba(0,0,0,0.75)' : 'rgba(255,255,255,0.75)'
      );
    } else {
      hideTip();
    }

    // Live endpoint — only when fully drawn
    if (progress >= 0.99) {
      const ex = pts[pts.length-1].x;
      const ey = pts[pts.length-1].y;

      // Lerp endpoint position
      lerpEndX += (ex - lerpEndX) * 0.12;
      lerpEndY += (ey - lerpEndY) * 0.12;

      // Pulse rings
      pulseRings.forEach(ring => {
        ctx.beginPath();
        ctx.arc(lerpEndX, lerpEndY, ring.r, 0, Math.PI*2);
        ctx.strokeStyle = p.pulse.replace('ALPHA', ring.alpha.toFixed(3));
        ctx.lineWidth = 1;
        ctx.stroke();
      });

      // Glow
      const grd = ctx.createRadialGradient(lerpEndX, lerpEndY, 0, lerpEndX, lerpEndY, 18);
      grd.addColorStop(0, p.glow);
      grd.addColorStop(1, 'rgba(247,147,26,0)');
      ctx.beginPath();
      ctx.arc(lerpEndX, lerpEndY, 18, 0, Math.PI*2);
      ctx.fillStyle = grd;
      ctx.fill();

      // Dot
      ctx.beginPath();
      ctx.arc(lerpEndX, lerpEndY, 3.5, 0, Math.PI*2);
      ctx.fillStyle = p.dot;
      ctx.fill();
    }
  }

  // ── Loading breathing animation ────────────────────────────────────────────
  function drawLoading(t) {
    const p = pal();
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.clearRect(0, 0, SZ, SZ);
    ctx.fillStyle = p.bg;
    ctx.fillRect(0, 0, SZ, SZ);

    const amplitude = 18 * (0.5 + 0.5 * Math.sin(t * 0.7));
    const pts = [];
    const steps = 80;
    for (let i = 0; i <= steps; i++) {
      const xf = i / steps;
      const x  = PL + xf * (SZ - PL - PR);
      const y  = SZ/2 + Math.sin(xf * Math.PI * 4 + t * 2.2) * amplitude;
      pts.push({ x, y });
    }
    const tan = computeTangents(pts);
    ctx.save();
    ctx.beginPath();
    splinePath(pts, tan);
    ctx.strokeStyle = p.loadLine;
    ctx.lineWidth = 1.2;
    ctx.lineJoin = 'round';
    ctx.stroke();
    ctx.restore();
  }

  // ── Main loop ─────────────────────────────────────────────────────────────
  let lastNow = performance.now();

  function loop(now) {
    const dt = Math.min((now - lastNow) / 1000, 0.05);
    lastNow = now;

    if (isLoading) {
      loadingT += dt;
      drawLoading(loadingT);
    } else {
      if (!animStart) animStart = now;
      const t    = Math.min(1, (now - animStart) / 1100);
      animProg   = 1 - Math.pow(1 - t, 3); // ease out cubic

      // Update pulse rings
      pulseTimer += dt;
      if (pulseTimer > 1.6) {
        pulseTimer = 0;
        pulseRings.push({ r: 4, alpha: 0.70 });
      }
      for (let i = pulseRings.length - 1; i >= 0; i--) {
        pulseRings[i].r     += 28 * dt;
        pulseRings[i].alpha *= Math.pow(0.018, dt); // decay
        if (pulseRings[i].alpha < 0.01) pulseRings.splice(i, 1);
      }

      draw(animProg);
    }

    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);

  // ── Price counter lerp ────────────────────────────────────────────────────
  function animatePrice(to) {
    const from = dispPrice || to;
    const t0   = performance.now();
    const dur  = 500;
    (function roll(now) {
      const t = Math.min(1, (now - t0) / dur);
      const e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      dispPrice = from + (to - from) * e;
      priceValEl.textContent = '$' + Math.round(dispPrice).toLocaleString('en-US');
      if (t < 1) requestAnimationFrame(roll);
    })(t0);
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────
  async function fetchMarket() {
    const r = await fetch(
      'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin&sparkline=false'
    );
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return (await r.json())[0];
  }

  async function fetchChart(days) {
    const r = await fetch(
      `https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=${days}`
    );
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j    = await r.json();
    const raw  = j.prices;
    const step = Math.max(1, Math.floor(raw.length / 500));
    return raw.filter((_, i) => i % step === 0).map(([ts, price]) => ({ ts, price }));
  }

  // ── Hover ─────────────────────────────────────────────────────────────────
  canvas.addEventListener('mousemove', e => {
    if (!chartData.length || isLoading) return;
    const rect = canvas.getBoundingClientRect();
    const relX = (e.clientX - rect.left) * (SZ / rect.width);
    const { N } = makeMap(chartData);
    hoverI = Math.max(0, Math.min(N - 1,
      Math.round(((relX - PL) / (SZ - PL - PR)) * (N - 1))
    ));
  });
  canvas.addEventListener('mouseleave', () => { hoverI = null; hideTip(); });

  // ── Range pills ───────────────────────────────────────────────────────────
  document.querySelectorAll('.rp').forEach(btn => {
    btn.addEventListener('click', async () => {
      document.querySelectorAll('.rp').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      currentDays = btn.dataset.d;
      hoverI = null;
      animStart = null;
      animProg  = 0;
      try {
        chartData = await fetchChart(currentDays);
        lerpEndX  = 0; lerpEndY = 0;
        pulseRings = [];
      } catch {}
    });
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  async function boot() {
    isLoading = true;
    try {
      const minWait = new Promise(r => setTimeout(r, 2200 + Math.random() * 1400));
      const [coin, chart] = await Promise.all([fetchMarket(), fetchChart(currentDays), minWait]);

      chartData = chart;
      animStart = null;

      const price  = coin.current_price;
      const change = coin.price_change_percentage_24h;
      const isUp   = change >= 0;

      animatePrice(price);
      prevRawPrice = price;

      changeBadge.textContent = (isUp ? '+' : '') + change.toFixed(2) + '%';
      changeBadge.className   = isUp ? 'up' : 'dn';

      // Seed lerped endpoint at last point
      const { px, py } = makeMap(chartData);
      const prices = chartData.map(d => d.price);
      lerpEndX = px(chartData.length - 1);
      lerpEndY = py(prices[prices.length - 1]);

      isLoading = false;

      // Live price refresh every 45s
      setInterval(async () => {
        try {
          const c = await fetchMarket();
          if (c.current_price !== prevRawPrice) {
            animatePrice(c.current_price);
            prevRawPrice = c.current_price;
            const up = c.price_change_percentage_24h >= 0;
            changeBadge.textContent = (up ? '+' : '') + c.price_change_percentage_24h.toFixed(2) + '%';
            changeBadge.className   = up ? 'up' : 'dn';
            pulseRings.push({ r: 4, alpha: 0.90 }); // extra pulse on live update
          }
        } catch {}
      }, 45000);

    } catch (e) {
      console.error(e);
    }
  }

  boot();
</script>
</body>
</html>
